<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Tasks</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fbdfc6;
    font-family: Arial, Helvetica, sans-serif;
  }
  .box {
    background: #fff;
    border: 2px solid #f8cdd4;
    border-radius: 12px;
    padding: 32px 28px;
    width: 300px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 3px 4px 0 rgba(0,0,0,0.08);
  }
  h2 {
    margin-top: 0;
    color: #1a1a1a;
    font-size: 30px;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px;
    margin: 14px 0;
    border: 2px solid #f6a9b3;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #f6a9b3;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background: #f39aa6;
  }
  a {
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="box">
<h2>Enter Your Tasks</h2>
<form method="POST" action="/add">
<input type="text" name="task" placeholder="Enter your task" required>
<button type="submit">ADD</button>
</form>
<a href="/options">
<button>Back</button>
</a>
</div>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then((reg) => console.log('Service Worker registered:', reg))
        .catch((err) => console.log('Service Worker registration failed:', err));
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>

<body
    style="
        margin:0;
        padding:0;
        height:100vh;
        background-image:url('static/todobg.jpeg');
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
        display:flex;
        justify-content:center;
        align-items:center;
    ">

    <div style="text-align:center;">

        <!-- Title -->
        <h1
            style="
                font-family:Gorditas, serif;
                font-size:40px;
                color:#000000;
                margin-bottom:80px;
            ">
            To-Do List
        </h1>

        <!-- Enter Button -->
        <a href="/login"
           style="
                display:inline-block;
                width:159px;
                height:34px;
                line-height:34px;
                background:#596BB5;
                color:white;
                text-decoration:none;
                font-family:Gorditas, serif;
                font-size:20px;
                border-radius:12px;
                box-shadow:0px 4px 8px rgba(0,0,0,0.35);
                text-align:center;
           ">
            Enter
        </a>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        .entry-box {
            position:absolute;
            top:34%;
            left:50%;
            transform:translate(-50%,-50%);
            text-align:center;
            width:80%;
            max-width:320px;
        }
        .entry-box h1 {
            font-family:Gorditas, serif;
            font-size:24px;
            font-weight:700;
            color:#1a1a1a;
            margin:0 0 10px 0;
            letter-spacing:0.5px;
        }
        .entry-box a {
            display:inline-block;
            width:110px;
            height:28px;
            line-height:28px;
            background:#596BB5;
            color:white;
            text-decoration:none;
            font-family:Gorditas, serif;
            font-size:13px;
            font-weight:700;
            letter-spacing:1px;
            border-radius:14px;
            box-shadow:0px 2px 5px rgba(0,0,0,0.3);
            text-align:center;
            text-transform:uppercase;
        }

        /* Desktop / larger screens: box sits higher and is bigger, so scale up */
        @media (min-width:600px) {
            .entry-box {
                top:14%;
                width:100%;
                max-width:480px;
            }
            .entry-box h1 {
                font-size:40px;
                margin:0 0 14px 0;
                letter-spacing:1px;
            }
            .entry-box a {
                width:159px;
                height:34px;
                line-height:34px;
                font-size:20px;
                border-radius:18px;
            }
        }
    </style>
</head>
<body
style="
    margin:0;
    padding:0;
    height:100vh;
    background-image:url('static/catbg.jpeg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    position:relative;
">
    <div class="entry-box">
        <h1>To-Do List</h1>
        <a href="/login">Enter</a>
    </div>
</body>
</html>
